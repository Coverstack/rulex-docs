[project]
site_name = "RuleX"
site_url = "https://docs.rulex.coverstack.in"
site_description = "Documentation for RuleX by Coverstack"
site_author = "Coverstack"
copyright = "&copy; 2026 Coverstack Technologies Pvt Ltd"
docs_dir = "docs"
extra_css = ["stylesheets/extra.css"]
nav = [
    {"Getting Started" = [
        {"Overview" = "index.md"},
        {"Full Access Features" = "full-access-features.md"}
    ]},
    {"Tutorial" = [
        {"Introduction" = "tutorial/index.md"},
        {"1. Data Source" = "tutorial/1-data-source.md"},
        {"2. Schema" = "tutorial/2-schema.md"},
        {"3. Endpoint" = "tutorial/3-endpoint.md"},
        {"4. JSON API" = "tutorial/4-json-api.md"},
        {"5. Data Validations" = "tutorial/5-validations.md"},
        {"6. Fixed Inputs" = "tutorial/6-fixed-inputs.md"},
        {"7. Web Form" = "tutorial/7-web-form.md"},
        {"8. Tests" = "tutorial/8-tests.md"},
        {"9. Ranges" = "tutorial/9-ranges.md"}
    ]},
    {"Core Concepts" = [
        {"Organisation" = "concepts/organisation.md"},
        {"Data Sources" = "concepts/data-sources.md"},
        {"Endpoint Schemas" = "concepts/endpoint-schemas.md"},
        {"Endpoints" = "concepts/endpoints.md"}
    ]},
    {"Team Management" = "team-management.md"},
    {"Configuring Endpoints" = [
        {"JSON API Mode" = "configuring/json-api-mode.md"},
        {"API Config" = "configuring/api-config.md"},
        {"Web Form Mode" = "configuring/web-form-mode.md"},
        {"Web Form Themes" = "configuring/web-form-themes.md"},
        {"Web Form Credentials" = "configuring/web-form-credentials.md"}
    ]},
    {"Fixed Inputs" = "fixed-inputs.md"},
    {"Endpoint Tests" = "endpoint-tests.md"},
    {"Architecture" = "architecture.md"},
    {"Self-Hosting" = [
        {"Exporting Endpoints" = "self-hosting/exporting-endpoints.md"},
        {"Running the Server" = "self-hosting/running-the-server.md"}
    ]},
    {"Reference" = [
        {"Supported Formulas" = "reference/supported-formulas.md"},
        {"Excel Compatibility" = "reference/excel-compatibility.md"},
        {"Data Validations" = "reference/data-validations.md"},
        {"Formula Errors" = "reference/formula-errors.md"},
        {"Type Casting" = "reference/type-casting.md"}
    ]}
]

[project.extra.status]
paid = "Full access feature"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/coverstack/"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/company/coverstack/"

[project.theme]
custom_dir = "overrides"
features = [
    "navigation.path",
    "navigation.instant",
    "navigation.instant.progress",
    "navigation.footer",
    "navigation.top",
    "toc.follow",
]

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.zensical.extensions.glightbox]
auto_themed = true

[project.markdown_extensions.zensical.extensions.macros]
render_by_default = false
on_error_fail = true

[project.extra.consent]
title = "Cookie consent"
description = """
    We use cookies to measure the effectiveness of our documentation and
    whether users find what they're searching for.
    With your consent, you're helping us to make our documentation better.
"""

[project.extra.analytics]
provider = "google"
property = "G-FFRGCY7XQW"

[project.extra.analytics.feedback]
title = "Was this page helpful?"

[[project.extra.analytics.feedback.ratings]]
icon = "material/emoticon-happy-outline"
name = "This page was helpful"
data = 1
note = "Thanks for your feedback!"

[[project.extra.analytics.feedback.ratings]]
icon = "material/emoticon-sad-outline"
name = "This page could be improved"
data = 0
note = """
  Thanks for your feedback! Help us improve this page by
  using our <a href="https://docs.google.com/forms/d/e/1FAIpQLSfHpMmVo7zvK-0X7ylBPYVkOaFex4rTT9GDeRx9J7KY6b7-cg/viewform?usp=pp_url&entry.934900454=Page+Title:+{title}%0APage+URL:+{url}%0A%0A" target="_blank" rel="noopener">feedback form</a>.
"""
